[server]
# 服务器配置
host = 0.0.0.0
port = 8000

[video]
# 视频目录路径（支持多个目录，用逗号分隔）
# 示例: /path/to/videos, /path/to/movies
# 支持别名: name=/path/to/dir
directories = movies=/Volumes/One Touch/movies

# 支持的视频格式（扩展名）
extensions = mp4,mkv,avi,mov,wmv,flv,webm,m4v

[ui]
# 每页显示视频数量
videos_per_page = 30

# 缩略图生成（需要ffmpeg，可选）
generate_thumbnails = false

[auth]
# 登录认证配置
enabled = true
username = admin
password = hx123456
secret_key = videoserver-secret-key-change-in-production